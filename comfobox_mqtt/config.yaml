name: "ComfoBox MQTT Bridge"
slug: "comfobox_mqtt"
version: "1.0.60"
description: "Bridge Zehnder ComfoBox (RF77 ComfoBox2Mqtt) via TCP-Serial (Waveshare) to MQTT"
url: "https://github.com/ptpat/ha-comfobox-mqtt-addon"

startup: services
boot: auto
init: false

arch:
  - aarch64
  - amd64
  - armv7
  - armhf
  - i386

services:
  - mqtt:need

build: .

options:
  use_socat: true
  waveshare_host: ""
  waveshare_port: 0
  serial_port: "/tmp/comfobox"
  baudrate: 38400

  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_pass: ""
  mqtt_base_topic: "ComfoBox"

  bacnet_master_id: 1
  bacnet_client_id: 3

schema:
  use_socat: bool
  waveshare_host: str
  waveshare_port: int(0,65535)
  serial_port: str
  baudrate: int(1200,115200)

  mqtt_host: str
  mqtt_port: int(1,65535)
  mqtt_user: str
  mqtt_pass: password
  mqtt_base_topic: str

  bacnet_master_id: int(0,4194303)
  bacnet_client_id: int(0,127)int(0,127)
