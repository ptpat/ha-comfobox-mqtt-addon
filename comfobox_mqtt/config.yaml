name: "ComfoBox MQTT Bridge"
version: "1.0.53"
slug: "comfobox_mqtt"
description: "Bridge Zehnder ComfoBox (RF77 ComfoBox2Mqtt) via TCP-Serial (Waveshare) to MQTT"
url: "https://github.com/ptpat/ha-comfobox-mqtt-addon"

arch:
  - aarch64
  - amd64
  - armv7
  - i386

startup: services
boot: auto
init: false

# Neutrale Defaults: UI soll entscheiden.
options:
  use_socat: true

  # Platzhalter (müssen gültig zum schema sein, sind aber absichtlich "leer")
  waveshare_host: ""
  waveshare_port: ""

  serial_port: "/tmp/comfobox"
  baudrate: 76800

  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_user: null
  mqtt_pass: null
  mqtt_base_topic: "ComfoBox"

  # IDs als Defaults sind okay, aber wenn du sie NUR in der UI setzen willst:
  # setze hier neutrale Werte, die du in der UI überschreibst.
  bacnet_master_id: 0
  bacnet_client_id: 0

schema:
  use_socat: bool

  waveshare_host: str
  waveshare_port: int(0,65535)

  serial_port: str
  baudrate: int(1200,115200)

  mqtt_host: str
  mqtt_port: int(1,65535)
  mqtt_user: str?
  mqtt_pass: password?
  mqtt_base_topic: str

  bacnet_master_id: int(0,4194303)
  bacnet_client_id: int(0,127)
