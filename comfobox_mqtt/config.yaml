name: "ComfoBox MQTT Bridge"
version: "1.3.13"
slug: "comfobox_mqtt"
description: "Zehnder ComfoBox Series 5 (ELESTA) via Waveshare RS485/TCP → RF77 ComfoBox2Mqtt → MQTT"
url: "https://github.com/ptpat/ha-comfobox-mqtt-addon"

# Mono läuft stabil nur auf amd64 und aarch64 (Debian glibc erforderlich)
arch:
  - amd64
  - aarch64

startup: services
boot: auto
init: false

# Kein devices-Eintrag nötig — socat verwendet ein PTY (kein /dev/ttyS0)

# Netzwerk: benötigt Zugang zum Waveshare (TCP) und MQTT Broker
host_network: false

options:
  # Waveshare RS485/Ethernet Adapter
  waveshare_host: ""
  waveshare_port: 8899

  # Serielle Verbindung (Standard für ComfoBox Series 5)
  # Hinweis: RF77 Autor berichtet dass 38400 auf Raspberry Pi funktioniert hat.
  # Falls 76800 nicht funktioniert, bitte auf 38400 ändern und ComfoBox neu starten.
  baudrate: 76800

  # MQTT Broker
  # HINWEIS: RF77 ComfoBoxMqttConsole unterstuetzt keine MQTT-Authentifizierung.
  # Mosquitto muss anonyme Verbindungen erlauben (s. README).
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_base_topic: "ComfoBox"

  # BACnet MSTP Parameter
  # bacnet_master_id: BACnet-Adresse der ComfoBox (meist 1)
  # bacnet_client_id: BACnet-Adresse dieses Clients (verschieden von master_id)
  bacnet_master_id: 1
  bacnet_client_id: 3

schema:
  waveshare_host: str
  waveshare_port: int(1,65535)
  baudrate: int(1200,115200)
  mqtt_host: str
  mqtt_port: int(1,65535)
  mqtt_base_topic: str
  bacnet_master_id: int(0,4194303)
  bacnet_client_id: int(0,127)
