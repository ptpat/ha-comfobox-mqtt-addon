name: "ComfoBox MQTT Bridge"
slug: "comfobox_mqtt"
version: "1.0.6"
description: "Zehnder ComfoBox Series 5 (ELESTA) RS485/BACnet → MQTT Bridge"
url: "https://github.com/ptpat/ha-comfobox-mqtt-addon"

startup: services
boot: auto
init: false

arch:
  - aarch64
  - armv7
  - armhf
  - amd64

# Optional, aber bei MQTT-Bridge sinnvoll (wie bei vielen Add-ons üblich)
services:
  - mqtt:need

# Lass build erstmal drin, damit der Supervisor deinen Dockerfile baut
build: .

options:
  use_socat: true
  waveshare_host: ""
  waveshare_port: 0
  serial_port: "/tmp/comfobox"
  baudrate: 38400
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_pass: ""

schema:
  use_socat: bool
  waveshare_host: str
  waveshare_port: int
  serial_port: str
  baudrate: int
  mqtt_host: str
  mqtt_port: int
  mqtt_user: str
  mqtt_pass: password
