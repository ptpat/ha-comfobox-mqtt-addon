configuration:
  waveshare_host:
    name: Waveshare Host / IP
    description: IP-Adresse oder Hostname des Waveshare RS485/Ethernet-Adapters.
  waveshare_port:
    name: Waveshare TCP Port
    description: TCP-Port des Waveshare-Adapters (Standard bei Waveshare ist 8899).
  baudrate:
    name: Baudrate
    description: RS485/MSTP Baudrate. Muss mit der ComfoBox-Konfiguration übereinstimmen (typisch 38400 oder 76800).
  mqtt_host:
    name: MQTT Broker Host
    description: Hostname oder IP des MQTT-Brokers. Bei Mosquitto Add-on ist dies "core-mosquitto".
  mqtt_port:
    name: MQTT Broker Port
    description: TCP-Port des MQTT-Brokers (Standard 1883).
  mqtt_user:
    name: MQTT Benutzername
    description: Optional. Leer lassen wenn keine Authentifizierung.
  mqtt_pass:
    name: MQTT Passwort
    description: Optional. Leer lassen wenn keine Authentifizierung.
  mqtt_base_topic:
    name: MQTT Base Topic
    description: Wurzel-Topic für alle ComfoBox-Werte (Standard "ComfoBox").
  bacnet_master_id:
    name: BACnet Master Device ID
    description: BACnet-Geräte-ID der ComfoBox (Standard 1). Im OEM-Menü der ComfoBox ersichtlich.
  bacnet_client_id:
    name: BACnet Client ID
    description: BACnet-ID dieses Bridges auf dem MSTP-Bus (Standard 3). Muss verschieden von der Master ID sein.
